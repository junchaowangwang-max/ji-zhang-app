name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          cordova create accounting AccountingApp
          cd accounting
          cordova platform add android
          cp ../index.html www/
          cp ../manifest.json www/
          cp ../sw.js www/
          cp ../icon_192.png www/
          cp ../icon_512.png www/
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AccountingApp-APK
          path: accounting/platforms/android/app/build/outputs/apk/**/*.apk
