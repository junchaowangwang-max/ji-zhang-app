name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project & Build APK
        run: |
          cordova create accounting-com com.expensetracker.app AccountingApp
          cd accounting-com
          cordova platform add android
          # 覆盖默认文件
          cp ../index.html www/
          cp ../manifest.json www/
          cp ../sw.js www/
          cp ../icon_192.png www/
          cp ../icon_512.png www/
          # 强制生成 APK
          cordova build android -- --packageType=apk

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AccountingApp-APK
          path: |
            accounting-com/platforms/android/app/build/outputs/apk/**/*.apk
